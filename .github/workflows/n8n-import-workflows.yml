name: 🚀 Import + Activate NEXUS n8n Workflows

on:
  push:
    paths:
      - 'n8n-workflows/*.json'
    branches:
      - main
  workflow_dispatch:

env:
  N8N_HOST: ${{ secrets.N8N_HOST || 'http://n8n:5678' }}

jobs:
  import-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import n8n Workflows
        run: |
          echo "🚀 Starting n8n workflow import..."

          for file in n8n-workflows/*.json; do
            filename=$(basename "$file")
            echo "📥 Importing: $filename"

            response=$(curl -s -X POST "${{ env.N8N_HOST }}/api/v1/workflows" \
              -H "X-N8N-API-Key: ${{ secrets.N8N_API_KEY }}" \
              -H "Content-Type: application/json" \
              --data-binary "@$file" \
              --write-out '\n%{http_code}')

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              workflow_id=$(echo "$body" | jq -r '.id // empty')
              workflow_name=$(echo "$body" | jq -r '.name // empty')
              echo "✅ Imported: $workflow_name (ID: $workflow_id)"
            else
              echo "⚠️  Status $http_code for $filename (may already exist)"
            fi
          done

          echo "✅ Import complete!"

      - name: List All Workflows
        run: |
          echo "📋 Active NEXUS Workflows:"
          curl -s -X GET "${{ env.N8N_HOST }}/api/v1/workflows?limit=100" \
            -H "X-N8N-API-Key: ${{ secrets.N8N_API_KEY }}" | \
            jq '.data[] | select(.name | startswith("NEXUS")) | {name, id, active}'

      - name: Verify Credentials Setup
        run: |
          echo "🔐 Checking required credentials..."
          credentials=$(curl -s -X GET "${{ env.N8N_HOST }}/api/v1/credentials?limit=100" \
            -H "X-N8N-API-Key: ${{ secrets.N8N_API_KEY }}")

          echo "Required credentials:"
          echo "  - NEXUS Postgres"
          echo "  - Resend SMTP"
          echo "  - NEXUS Telegram"
          echo ""
          echo "Setup these in n8n before activating workflows"

      - name: Post Success Message
        if: success()
        run: |
          echo "🎉 NEXUS n8n Suite Deployed"
          echo ""
          echo "6 Powerful workflows ready:"
          echo "  ✅ Global Error Notifier"
          echo "  ✅ Stripe Order Fulfillment"
          echo "  ✅ Abandoned Order Recovery"
          echo "  ✅ Daily Sales Report"
          echo "  ✅ Security Incident Aggregator"
          echo "  ✅ AI Support Router"
          echo "  ✅ AI Product Upsell"
          echo ""
          echo "Next: Activate in n8n UI and set credentials"
