networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge

services:
  # === NEXUS APP (Next.js) ===
  nexus-app:
    build: .
    container_name: nexus_app
    restart: unless-stopped
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_v2
      NEXTAUTH_SECRET: ${JWT_SECRET}
      # email key used by newsletter-agent and order confirmations
      RESEND_API_KEY: ${RESEND_KEY}
      GEMINI_API_KEY: ${GEMINI_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    secrets:
      - db_password
      - jwt_secret
      - resend_key
      - gemini_key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus.rule=Host(`nexus.yourdomain.com`)"
      - "traefik.http.routers.nexus.entrypoints=websecure"
      - "traefik.http.routers.nexus.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexus.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === DB & CACHE (internal only) ===
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: nexus_v2
    secrets:
      - db_password
    volumes:
      - nexus_v2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    networks:
      - internal
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Rust service (internal) ===
  nexus-rust-service:
    build: ./rust-agents/crates/service
    container_name: nexus_rust
    restart: unless-stopped
    networks:
      - internal

  # === TRAEFIK (public entrypoint) ===
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@yourdomain.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

  # === VAULTWARDEN (secrets UI) ===
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - vw-data:/data
    environment:
      DOMAIN: https://vault.yourdomain.com
      SIGNUPS_ALLOWED: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault.rule=Host(`vault.yourdomain.com`)"
      - "traefik.http.routers.vault.entrypoints=websecure"
      - "traefik.http.routers.vault.tls.certresolver=letsencrypt"

  # === MONITORING (Grafana + Prometheus + Loki) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - prometheus-data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.yourdomain.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"

  # === WIREGUARD VPN ===
  wireguard:
    image: weejewel/wg-easy
    container_name: wireguard
    restart: unless-stopped
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      WG_EASYRSA: "true"
      PASSWORD: ${WIREGUARD_PASS}
    ports:
      - "51820:51820/udp"
    volumes:
      - wireguard-config:/etc/wireguard

  # === TELEGRAM NOTIFIER (SMS/OTP replacement) ===
  telegram-notify:
    image: planecore/notifybot
    container_name: telegram_notify
    restart: unless-stopped
    networks:
      - internal
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./notify-db:/usr/src/app/db

  # === UPTIME KUMA (bonus free monitoring) ===
  uptime-kuma:
    image: louislam/uptime-kuma
    container_name: uptime_kuma
    restart: unless-stopped
    networks:
      - internal
      - proxy
    volumes:
      - uptime-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`status.yourdomain.com`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"

volumes:
  nexus_v2_postgres_data:
  letsencrypt:
  vw-data:
  prometheus-data:
  loki-data:
  grafana-data:
  wireguard-config:
  uptime-data:
  notify-db:

secrets:
  db_password:
    file: ./db_password.txt
  jwt_secret:
    file: ./jwt_secret.txt
  resend_key:
    file: ./resend_key.txt
  gemini_key:
    file: ./gemini_key.txt
