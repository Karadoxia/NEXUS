name: nexus-v2

networks:
  # External/reverse-proxy tier
  proxy:
    name: proxy # explicit name so Traefik's --providers.docker.network=proxy works
    external: true

  # Application backend tier
  backend:
    driver: bridge
    internal: true

  # Database tier (isolated from other services)
  database:
    driver: bridge
    internal: true

  # Identity services tier (lldap, Keycloak, Semaphore)
  identity:
    driver: bridge
    internal: true

  # Monitoring tier (isolated from application logic)
  monitoring:
    driver: bridge
    internal: true

  # Security tools tier (isolated from other tiers)
  security:
    driver: bridge
    internal: true

  # Infrastructure/management tier
  infrastructure:
    driver: bridge
    internal: true

services:
  # === NEXUS APP (Next.js) ===
  nexus-app:
    build: .
    container_name: nexus-app
    restart: unless-stopped
    user: "node"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    ports:
      - "3030:3030"
    networks:
      - backend
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      postgres-ai:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_v2
      HR_DATABASE_URL: postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_hr
      AI_DATABASE_URL: postgresql://nexus_ai:${DB_PASSWORD}@postgres-ai:5432/nexus_ai
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_MIGRATIONS: "true"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.nexus-io.duckdns.org}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.nexus-io.duckdns.org}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-caspertech78@gmail.com}
      EMAIL_FROM: ${EMAIL_FROM:-NEXUS Store <onboarding@resend.dev>}
      INFRA_DATABASE_URL: postgresql://nexus_ai:${DB_PASSWORD}@postgres-ai:5432/nexus_ai
      RESEND_API_KEY: ${RESEND_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      N8N_API_KEY: ${N8N_API_KEY}
    secrets:
      - db_password
      - jwt_secret
      - resend_key
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.nexus.rule=Host(`app.nexus-io.duckdns.org`)"
      - "traefik.http.routers.nexus.entrypoints=web"
      - "traefik.http.routers.nexus.middlewares=https-redirect"
      # Public: HTTPS (TLS) — wildcard-only cert (DuckDNS supports only 1 TXT record)
      - "traefik.http.routers.nexus-tls.rule=Host(`app.nexus-io.duckdns.org`)"
      - "traefik.http.routers.nexus-tls.entrypoints=websecure"
      - "traefik.http.routers.nexus-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nexus-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-app.local
      - "traefik.http.routers.nexus-local.rule=Host(`nexus-app.local`)"
      - "traefik.http.routers.nexus-local.entrypoints=web"
      - "traefik.http.services.nexus.loadbalancer.server.port=3030"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === DB & CACHE (internal only) ===
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    user: "postgres"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - backend
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: nexus_v2
    secrets:
      - db_password
    volumes:
      - nexus_v2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s

  # === AI/ML DEDICATED DATABASE ===
  postgres-ai:
    image: postgres:16-alpine
    container_name: nexus-postgres-ai
    restart: unless-stopped
    user: "postgres"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - backend
    environment:
      POSTGRES_USER: nexus_ai
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: nexus_ai
    secrets:
      - db_password
    volumes:
      - nexus_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    user: "redis"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - backend
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Rust service (internal, opt-in) ===
  # This service only starts when explicitly requested via the 'rust' profile.
  # docker compose up -d                     → skips this (rust-agents dir may not exist)
  # docker compose --profile rust up -d      → includes this (requires rust-agents source)
  nexus-rust-service:
    profiles: [rust]
    build: ./rust-agents/crates/service
    container_name: nexus-rust
    restart: unless-stopped
    networks:
      - backend

  # === TRAEFIK (public entrypoint) ===
  traefik:
    image: traefik:v3.1
    container_name: nexus-traefik
    restart: unless-stopped
    user: "65532:120" # Run as non-root user with docker group (GID 120)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # FIX: tell Traefik which network to use for ALL containers (avoids
      # picking internal-only IPs for containers on multiple networks)
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=caspertech92@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=duckdns"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=30"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.disablepropagationcheck=true"
      - "--api=true"
      - "--api.dashboard=true"
      # api.insecure exposes the API (and /metrics) on port 8080 inside the container.
      # Port 8080 is NOT mapped to the host, so this is accessible only to other
      # containers (e.g. Prometheus) via the proxy Docker network — not publicly.
      - "--api.insecure=true"
      # Enable Prometheus metrics endpoint (scraped by prometheus at traefik:8080/metrics)
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    labels:
      - "traefik.enable=true"
      # Local dashboard: http://nexus-traefik.local
      - "traefik.http.routers.traefik-dashboard.rule=Host(`nexus-traefik.local`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      # Shared HTTPS-redirect middleware used by all public routers
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      # VaultWarden: local HTTPS via Traefik self-signed certs
      - "traefik.http.routers.vaultwarden-local.rule=Host(`nexus-vaultwarden.local`)"
      - "traefik.http.routers.vaultwarden-local.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-local.tls=true"
      - "traefik.http.services.vault.loadbalancer.server.port=80"
      # Loki: rewrite root / → /metrics (Loki is API-only, no web UI at root)
      # replacepathregex matches path-only (not full URL), so ^/$ works correctly
      - "traefik.http.middlewares.loki-root-rewrite.replacepathregex.regex=^/$$"
      - "traefik.http.middlewares.loki-root-rewrite.replacepathregex.replacement=/metrics"

  # === VAULTWARDEN (secrets UI) ===
  # FIX: VaultWarden's web vault requires a TLS secure context (HTTPS or localhost).
  # Accessing via http://*.local fails because browsers block SubtleCrypto on non-secure origins.
  # Solution: bind port 8080 on localhost — http://localhost:8080 IS a secure context.
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: nexus-vaultwarden
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - vw-data:/data
    environment:
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN:-}
      ROCKET_PORT: "80"
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.vault.rule=Host(`vault.nexus-io.duckdns.org`)"
      - "traefik.http.routers.vault.entrypoints=web"
      - "traefik.http.routers.vault.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.vault-tls.rule=Host(`vault.nexus-io.duckdns.org`)"
      - "traefik.http.routers.vault-tls.entrypoints=websecure"
      - "traefik.http.routers.vault-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vault-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      - "traefik.http.services.vault.loadbalancer.server.port=80"

  # === MONITORING (Grafana + Prometheus + Loki) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./data/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Local only — Prometheus must NOT be publicly exposed
      - "traefik.http.routers.prometheus-local.rule=Host(`nexus-prometheus.local`)"
      - "traefik.http.routers.prometheus-local.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: nexus-blackbox-exporter
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
      - proxy
    ports:
      - "9115:9115"
    volumes:
      - ./data/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

  pushgateway:
    image: prom/pushgateway:latest
    container_name: nexus-pushgateway
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
      - proxy
    ports:
      - "9091:9091"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: nexus-alertmanager
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./data/alertmanager.tmpl.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
      - alertmanager-data:/alertmanager
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'sed "s|__TELEGRAM_BOT_TOKEN__|$${TELEGRAM_BOT_TOKEN}|g; s|__TELEGRAM_CHAT_ID__|$${TELEGRAM_CHAT_ID}|g" /etc/alertmanager/alertmanager.tmpl.yml > /tmp/alertmanager.yml && /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager'
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Local only — Alertmanager web UI for managing alerts/silences
      - "traefik.http.routers.alertmanager-local.rule=Host(`nexus-alertmanager.local`)"
      - "traefik.http.routers.alertmanager-local.entrypoints=web"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  loki:
    image: grafana/loki:latest
    container_name: nexus-loki
    restart: unless-stopped
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - backend
      - proxy
    volumes:
      - loki-data:/loki
      - ./data/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    labels:
      - "traefik.enable=true"
      # Local only — Loki must NOT be publicly exposed
      # Root / is rewritten to /metrics (API-only service, no web UI at root)
      - "traefik.http.routers.loki-local.rule=Host(`nexus-loki.local`)"
      - "traefik.http.routers.loki-local.entrypoints=web"
      - "traefik.http.routers.loki-local.middlewares=loki-root-rewrite"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    user: "472:472"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - backend
      - proxy
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
      - ./data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # FIX: do NOT hardcode GF_SERVER_ROOT_URL to production domain.
      # When set, Grafana embeds that URL in ALL JS/CSS/API links.
      # Accessing via http://nexus-grafana.local would then fail because
      # the browser can't load assets from grafana.nexus-io.duckdns.org → "Gateway Failed".
      # Leave unset: Grafana generates relative URLs, works on any hostname.
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.grafana.rule=Host(`grafana.nexus-io.duckdns.org`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.grafana-tls.rule=Host(`grafana.nexus-io.duckdns.org`)"
      - "traefik.http.routers.grafana-tls.entrypoints=websecure"
      - "traefik.http.routers.grafana-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-grafana.local
      - "traefik.http.routers.grafana-local.rule=Host(`nexus-grafana.local`)"
      - "traefik.http.routers.grafana-local.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # === EXPORTERS (for Prometheus metrics) ===
  node_exporter:
    image: prom/node-exporter:latest
    container_name: nexus-node-exporter
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nexus-postgres-exporter
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
      - proxy
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://nexus:${DB_PASSWORD}@postgres:5432/nexus_v2?sslmode=disable"
    depends_on:
      - postgres

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: nexus-redis-exporter
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
      - proxy
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      - redis

  postgres-ai-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nexus-postgres-ai-exporter
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
      - proxy
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://nexus_ai:${DB_PASSWORD}@postgres-ai:5432/nexus_ai?sslmode=disable"
    depends_on:
      - postgres-ai

  # === WIREGUARD VPN ===
  # FIX: switched from unmaintained weejewel/wg-easy to the active fork
  # ghcr.io/wg-easy/wg-easy which uses PASSWORD_HASH instead of PASSWORD
  # and correctly handles WG_ALLOWED_IPS, WG_DEFAULT_DNS, etc.
  wireguard:
    image: ghcr.io/wg-easy/wg-easy
    container_name: nexus-wireguard
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL - Removed to ensure iptables and networking function correctly
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - proxy
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      # Required for iptables masquerade to work inside the container
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      WG_HOST: ${WG_HOST:-vpn.nexus-io.duckdns.org}
      # wg-easy v14+ requires a bcrypt hash — plain PASSWORD is no longer accepted.
      # Generate via provision.sh (auto) or manually:
      #   docker run --rm ghcr.io/wg-easy/wg-easy wgpw YOUR_PASS
      # Then add to .env:  WIREGUARD_PASSWORD_HASH='$$2b$$12$$...'
      # (double $$ escapes the dollar sign in docker-compose env interpolation)
      PASSWORD_HASH: ${WIREGUARD_PASSWORD_HASH:-}
      WG_DEFAULT_DNS: 1.1.1.1,1.0.0.1
      WG_ALLOWED_IPS: "0.0.0.0/0,::/0"
      PORT: "51821"
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    volumes:
      - wireguard-config:/etc/wireguard
      # Mount host kernel modules so the container can load iptable_nat
      - /lib/modules:/lib/modules:ro
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.wireguard.rule=Host(`vpn.nexus-io.duckdns.org`)"
      - "traefik.http.routers.wireguard.entrypoints=web"
      - "traefik.http.routers.wireguard.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.wireguard-tls.rule=Host(`vpn.nexus-io.duckdns.org`)"
      - "traefik.http.routers.wireguard-tls.entrypoints=websecure"
      - "traefik.http.routers.wireguard-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wireguard-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-vpn.local
      - "traefik.http.routers.wireguard-local.rule=Host(`nexus-vpn.local`)"
      - "traefik.http.routers.wireguard-local.entrypoints=web"
      - "traefik.http.services.wireguard.loadbalancer.server.port=51821"

  wireguard-exporter:
    image: mindflavor/prometheus-wireguard-exporter:latest
    container_name: nexus-wireguard-exporter
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    environment:
      PROMETHEUS_WIREGUARD_EXPORTER_ADDRESS: "0.0.0.0"
      PROMETHEUS_WIREGUARD_EXPORTER_PORT: "9586"
      PROMETHEUS_WIREGUARD_EXPORTER_VERBOSE_ENABLED: "false"
      PROMETHEUS_WIREGUARD_EXPORTER_PREPEND_SUDO_ENABLED: "false"
    command:
      - "--prepend_sudo"
      - "false"
    cap_add:
      - NET_ADMIN

  # === TELEGRAM NOTIFIER (SMS/OTP replacement) ===
  telegram-notify:
    image: planecore/notifybot
    container_name: nexus-telegram-notify
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - backend
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CHAT_ID: ${TELEGRAM_CHAT_ID}
    command: ["sh", "./docker-start.sh"]
    volumes:
      - ./notify-db:/usr/src/app/db

  # === UPTIME KUMA (monitoring) ===
  uptime-kuma:
    image: louislam/uptime-kuma
    container_name: nexus-uptime-kuma
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL - Removed to allow setpriv to function correctly
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.uptime.rule=Host(`status.nexus-io.duckdns.org`)"
      - "traefik.http.routers.uptime.entrypoints=web"
      - "traefik.http.routers.uptime.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.uptime-tls.rule=Host(`status.nexus-io.duckdns.org`)"
      - "traefik.http.routers.uptime-tls.entrypoints=websecure"
      - "traefik.http.routers.uptime-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-uptime.local
      - "traefik.http.routers.uptime-local.rule=Host(`nexus-uptime.local`)"
      - "traefik.http.routers.uptime-local.entrypoints=web"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  # === N8N (workflow automation) ===
  # FIX: n8n requires the 'n8n' database to exist in Postgres before starting.
  # Run ./scripts/provision.sh after first 'docker compose up -d' to create it.
  # n8n will restart automatically once the database is available.
  n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n
    restart: unless-stopped
    user: "node"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    ports:
      - "5678:5678"
    networks:
      - backend
      - proxy
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: nexus-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: nexus
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme32charslongpleasechange}
      # Local vs production settings — override via .env for production
      N8N_HOST: ${N8N_HOST:-n8n.nexus-io.duckdns.org}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.nexus-io.duckdns.org}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      EXECUTIONS_MODE: regular
      # Admin account initialization
      N8N_DEFAULT_ADMIN_EMAIL: caspertech92@gmail.com
      N8N_DEFAULT_ADMIN_PASSWORD: C@sper@22032011
      # Queue mode disabled - no workers configured
      # QUEUE_BULL_REDIS_HOST: redis
      # QUEUE_BULL_REDIS_PORT: "6379"
      # QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_LOG_LEVEL: info
      # Enable the public REST API (required for X-N8N-API-KEY auth)
      N8N_PUBLIC_API_DISABLED: "false"
      # Disable telemetry / diagnostics to avoid external network calls that slow login
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_QUEUE_METRICS: "true"
      N8N_METRICS_INCLUDE_WORKFLOW_METRICS: "true"
      # Admin email for reports/alerts
      ADMIN_EMAIL: ${ADMIN_EMAIL:-caspertech78@gmail.com}
      # Telegram Integration - Required for 12 workflows
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - n8n-data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.n8n.rule=Host(`n8n.nexus-io.duckdns.org`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.routers.n8n.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.n8n-tls.rule=Host(`n8n.nexus-io.duckdns.org`)"
      - "traefik.http.routers.n8n-tls.entrypoints=websecure"
      - "traefik.http.routers.n8n-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.n8n-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-n8n.local
      - "traefik.http.routers.n8n-local.rule=Host(`nexus-n8n.local`)"
      - "traefik.http.routers.n8n-local.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  # === NGINX PROXY MANAGER — SSL Certificate Management UI ===
  # Free/open-source cert manager with web dashboard and Let's Encrypt auto-renewal.
  # Complements Traefik: Traefik handles all service routing/certs automatically,
  # while NPM provides a visual UI to issue, view, and renew additional certs
  # (useful for DNS-challenge wildcard certs, cert expiry visibility, etc.)
  #
  # ⚠ NPM must NOT bind to host ports 80 or 443 — Traefik already owns those.
  #   Access NPM via:
  #     http://nexus-npm.local          (through Traefik, local)
  #     http://localhost:81             (direct — admin UI port)
  #   Default login: admin@example.com / changeme  (change on first login)
  #
  # DNS Challenge: To issue Let's Encrypt certs without needing port 80,
  #   use "DNS Challenge" in NPM → configure your DNS provider API token.
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nexus-nginx-pm
    restart: unless-stopped
    # user: "101:101" - Removed to allow s6-overlay to manage permissions
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL - Removed to allow Nginx and management processes to function
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - proxy
    ports:
      # Admin UI — direct access on localhost only (no host 80/443 conflict)
      - "127.0.0.1:81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.npm.rule=Host(`npm.nexus-io.duckdns.org`)"
      - "traefik.http.routers.npm.entrypoints=web"
      - "traefik.http.routers.npm.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.npm-tls.rule=Host(`npm.nexus-io.duckdns.org`)"
      - "traefik.http.routers.npm-tls.entrypoints=websecure"
      - "traefik.http.routers.npm-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.npm-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local: http://nexus-npm.local
      - "traefik.http.routers.npm-local.rule=Host(`nexus-npm.local`)"
      - "traefik.http.routers.npm-local.entrypoints=web"
      - "traefik.http.services.npm.loadbalancer.server.port=81"

  # === MONITORING EXPORTERS =====================================================
  # cAdvisor — per-container CPU/RAM/network/disk metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: nexus-cadvisor
    restart: unless-stopped
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    labels:
      - "traefik.enable=false"
      - "traefik.docker.network=proxy"
    command:
      - "--port=8080"
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  # === PORTAINER (Container Management) =======================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: nexus-portainer
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      # Use master password for admin
      PORTAINER_ADMIN_PASSWORD: ${PORTAINER_ADMIN_PASSWORD:-C@sper@22032011}
      # Enable metrics
      PORTAINER_HOSTMANAGEMENTENABLED: "true"
      PORTAINER_EDGEASYNCSENABLED: "false"
      # Security headers
      PORTAINER_SECURECOOKIE: "true"
      PORTAINER_HTTPSONLY: "false"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9000/api/system/status",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.portainer.rule=Host(`portainer.nexus-io.duckdns.org`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.routers.portainer.middlewares=https-redirect"
      - "traefik.http.routers.portainer.service=portainer"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.portainer-tls.rule=Host(`portainer.nexus-io.duckdns.org`)"
      - "traefik.http.routers.portainer-tls.entrypoints=websecure"
      - "traefik.http.routers.portainer-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portainer-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      - "traefik.http.routers.portainer-tls.service=portainer"
      # Local: http://nexus-portainer.local
      - "traefik.http.routers.portainer-local.rule=Host(`nexus-portainer.local`)"
      - "traefik.http.routers.portainer-local.entrypoints=web"
      - "traefik.http.routers.portainer-local.service=portainer"
      # Service backend
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.4
    container_name: nexus-crowdsec
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL - Removed to allow crowdsec to manage its environment and collections
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      - COLLECTIONS=crowdsecurity/traefik
      - BOUNCER_KEY=${CROWDSEC_BOUNCER_KEY}
      - GID=${GID:-1000}
    volumes:
      - crowdsec-db:/var/lib/crowdsec/data
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - /var/log/traefik:/var/log/traefik:ro
      - ./logs:/var/log/nexus:ro
    networks:
      - backend
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crowdsec-local.rule=Host(`nexus-crowdsec.local`)"
      - "traefik.http.routers.crowdsec-local.entrypoints=web"
      - "traefik.http.services.crowdsec.loadbalancer.server.port=8080"

  falco:
    image: falcosecurity/falco-no-driver:latest
    container_name: nexus-falco
    restart: unless-stopped
    privileged: true
    environment:
      - FALCO_DRIVER_CHOICE=modern_ebpf
    cap_add:
      - SYS_PTRACE
      - SYS_RESOURCE
      - SYS_ADMIN
      - SYS_CHROOT
    cap_drop: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./falco/falco_rules.local.yaml:/etc/falco/rules.d/nexus_rules.yaml:ro
    command: falco -o "json_output=true" -o "json_include_output_property=true"
    networks:
      - backend
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.falco-local.rule=Host(`nexus-falco.local`)"
      - "traefik.http.routers.falco-local.entrypoints=web"
      - "traefik.http.services.falco.loadbalancer.server.port=8765"

  trivy-cron:
    image: aquasec/trivy:0.58.0
    container_name: nexus-trivy-cron
    restart: unless-stopped
    user: "nobody"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "while true; do ts=$$(date +%s); trivy image --quiet --format table --exit-code 1 --severity HIGH,CRITICAL nexus-v2-nexus-app; c1=$$?; trivy image --quiet --format table --exit-code 1 --severity HIGH,CRITICAL n8nio/n8n:latest; c2=$$?; code=0; if [ $$c1 -ne 0 ] || [ $$c2 -ne 0 ]; then code=1; fi; status=0; if [ $$code -eq 0 ]; then status=1; fi; printf 'trivy_scan_last_run_timestamp %s\\ntrivy_scan_exit_code %s\\ntrivy_scan_success %s\\n' $$ts $$code $$status >/tmp/trivy_metrics.prom; if command -v curl >/dev/null 2>&1; then curl -s --data-binary @/tmp/trivy_metrics.prom http://pushgateway:9091/metrics/job/trivy_cron >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -qO- --post-file=/tmp/trivy_metrics.prom http://pushgateway:9091/metrics/job/trivy_cron >/dev/null; fi; sleep 86400; done"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
      - proxy

  # === CLOUDFLARE TUNNEL (Secure Remote Access) ================================
  # Provides secure public access without port forwarding
  # Requires: CLOUDFLARE_TUNNEL_TOKEN set in .env
  # Setup: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nexus-cloudflared
    restart: unless-stopped
    networks:
      - proxy
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - cloudflare-tunnel

  # === IDENTITY SERVICES =================================================
  # lldap — LDAP directory server (identity, user management)
  lldap:
    image: lldap/lldap:stable
    container_name: nexus-lldap
    restart: unless-stopped
    # user: "1000:1000"  # Commented out - LLDAP needs root to setup permissions
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL  # Commented out - LLDAP needs capabilities to manage /data folder
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - backend
      - identity
      - proxy
    ports:
      - "127.0.0.1:3890:3890" # LDAP protocol (internal only)
      - "17170:17170" # Web UI
    environment:
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET:-change-me-generate-with-openssl}
      LLDAP_LDAP_USER_PASS: ${LLDAP_ADMIN_PASSWORD:-change-me-generate-with-openssl}
      LLDAP_LDAP_BASE_DN: dc=nexus-io,dc=org
    volumes:
      - lldap-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      # Web UI (HTTP/HTTPS)
      - "traefik.http.routers.lldap-web.rule=Host(`lldap.nexus-io.duckdns.org`)"
      - "traefik.http.routers.lldap-web.entrypoints=web"
      - "traefik.http.routers.lldap-web.middlewares=https-redirect"
      - "traefik.http.routers.lldap-web-tls.rule=Host(`lldap.nexus-io.duckdns.org`)"
      - "traefik.http.routers.lldap-web-tls.entrypoints=websecure"
      - "traefik.http.routers.lldap-web-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lldap-web-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      - "traefik.http.services.lldap-web.loadbalancer.server.port=17170"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17170"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Keycloak — OAuth2/OIDC identity broker (Federation from lldap)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: nexus-keycloak
    restart: unless-stopped
    # user: "1000:1000"  # Commented out - Keycloak needs proper permissions
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL  # Commented out - Keycloak needs capabilities
    command: start
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    networks:
      - backend
      - identity
      - proxy
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Public: HTTP → HTTPS redirect
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.nexus-io.duckdns.org`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.routers.keycloak.middlewares=https-redirect"
      # Public: HTTPS (TLS)
      - "traefik.http.routers.keycloak-tls.rule=Host(`keycloak.nexus-io.duckdns.org`)"
      - "traefik.http.routers.keycloak-tls.entrypoints=websecure"
      - "traefik.http.routers.keycloak-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.keycloak-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local access
      - "traefik.http.routers.keycloak-local.rule=Host(`keycloak.local`) || Host(`nexus-keycloak.local`)"
      - "traefik.http.routers.keycloak-local.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Ansible Semaphore — Playbook execution + audit trail
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: nexus-semaphore
    restart: unless-stopped
    # user: "1000:1000"  # Commented out - Semaphore needs proper permissions
    security_opt:
      - no-new-privileges:true
    # cap_drop:
    #   - ALL  # Commented out - Semaphore needs capabilities
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
    networks:
      - backend
      - identity
      - infrastructure
      - proxy
    ports:
      - "3002:3000"
    environment:
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: ${DB_PASSWORD}
      SEMAPHORE_DB_HOST: postgres
      SEMAPHORE_DB_PORT: "5432"
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB: semaphore
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_EMAIL: caspertech78@gmail.com
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASSWORD:-change-me}
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ENCRYPT_KEY:-change-me-generate-random-32-chars}
      # LDAP Integration
      SEMAPHORE_LDAP_ACTIVATED: "yes"
      SEMAPHORE_LDAP_HOST: lldap
      SEMAPHORE_LDAP_PORT: "3890"
      SEMAPHORE_LDAP_DN_BIND: "cn=svc.readonly,ou=people,dc=nexus-io,dc=org"
      SEMAPHORE_LDAP_PASSWORD: ${LDAP_READONLY_PASSWORD:-change-me}
      SEMAPHORE_LDAP_DN_SEARCH: "dc=nexus-io,dc=org"
      SEMAPHORE_LDAP_SEARCH_FILTER: "(&(uid=%s)(memberOf=cn=infra_admins,ou=groups,dc=nexus-io,dc=org))"
    depends_on:
      postgres:
        condition: service_healthy
      lldap:
        condition: service_healthy
    volumes:
      - semaphore-data:/home/semaphore
      - ./ansible-playbooks:/home/semaphore/ansible:ro
    labels:
      - "traefik.enable=true"
      # Public HTTP → HTTPS redirect
      - "traefik.http.routers.semaphore.rule=Host(`semaphore.nexus-io.duckdns.org`)"
      - "traefik.http.routers.semaphore.entrypoints=web"
      - "traefik.http.routers.semaphore.middlewares=https-redirect"
      # Public HTTPS
      - "traefik.http.routers.semaphore-tls.rule=Host(`semaphore.nexus-io.duckdns.org`)"
      - "traefik.http.routers.semaphore-tls.entrypoints=websecure"
      - "traefik.http.routers.semaphore-tls.tls.certresolver=letsencrypt"
      - "traefik.http.routers.semaphore-tls.tls.domains[0].main=*.nexus-io.duckdns.org"
      # Local access
      - "traefik.http.routers.semaphore-local.rule=Host(`semaphore.local`) || Host(`nexus-semaphore.local`)"
      - "traefik.http.routers.semaphore-local.entrypoints=web"
      - "traefik.http.services.semaphore.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === FAIL2BAN (SSH Brute Force Protection) ===================================
  # Monitors logs and bans IPs after failed login attempts
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: nexus-fail2ban
    restart: unless-stopped
    networks:
      - backend
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      F2B_LOG_LEVEL: INFO
      F2B_DB_PURGE_AGE: 7d
    volumes:
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
    profiles:
      - fail2ban

volumes:
  nexus_v2_postgres_data:
  nexus_ai_postgres_data:
  letsencrypt:
