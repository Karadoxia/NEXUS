version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus_v2_db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_v2
    ports:
      - "5433:5432"
    volumes:
      - nexus_v2_postgres_data:/var/lib/postgresql/data
    networks:
      - nexus_v2_net

  redis:
    image: redis:7-alpine
    container_name: nexus_v2_cache
    ports:
      - "6380:6379"
    networks:
      - nexus_v2_net

  nexus-rust-service:
    build: ./rust-agents/crates/service
    container_name: nexus_rust_service
    ports:
      - "8081:8081"
    networks:
      - nexus_v2_net
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  nexus_v2_postgres_data:

networks:
  nexus_v2_net:
    driver: bridge
