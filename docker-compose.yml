version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_v2_db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexus_v2
    ports:
      - "5433:5432"
    volumes:
      - nexus_v2_postgres_data:/var/lib/postgresql/data
    networks:
      - nexus_v2_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_v2_cache
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    networks:
      - nexus_v2_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:6
    container_name: nexus_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "15432:80"  # web UI on host:15432
    depends_on:
      - postgres
    networks:
      - nexus_v2_net
    restart: unless-stopped

  nexus-rust-service:
    build: ./rust-agents/crates/service
    container_name: nexus_rust_service
    ports:
      - "8081:8081"
    networks:
      - nexus_v2_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

volumes:
  nexus_v2_postgres_data:

networks:
  nexus_v2_net:
    driver: bridge
    internal: true   # ← blocks external access
