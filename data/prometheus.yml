global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['nexus-alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # ===== CORE INFRASTRUCTURE METRICS =====

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']

  # Alertmanager self-metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['nexus-alertmanager:9093']

  # Loki log aggregator
  - job_name: 'loki'
    static_configs:
      - targets: ['nexus-loki:3100']

  # Grafana (exposes /metrics natively)
  - job_name: 'grafana'
    static_configs:
      - targets: ['nexus-grafana:3000']
    metrics_path: '/metrics'

  # Traefik reverse proxy (metrics enabled via --metrics.prometheus)
  - job_name: 'traefik'
    static_configs:
      - targets: ['nexus-traefik:8080']
    metrics_path: '/metrics'

  # Host machine metrics (CPU, RAM, disk, network) — prom/node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['nexus-node-exporter:9100']

  # ===== DATABASE EXPORTERS (3 Postgres DBs) =====

  # PostgreSQL primary DB metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['nexus-postgres-exporter:9187']

  # PostgreSQL AI DB metrics
  - job_name: 'postgres-ai'
    static_configs:
      - targets: ['nexus-postgres-ai-exporter:9187']

  # PostgreSQL Infra DB metrics
  - job_name: 'postgres-infra'
    static_configs:
      - targets: ['nexus-postgres-infra-exporter:9187']

  # Redis cache metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['nexus-redis-exporter:9121']

  # ===== CONTAINER & SYSTEM METRICS =====

  # Per-container Docker metrics — cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['nexus-cadvisor:8080']
    metrics_path: '/metrics'

  # n8n native metrics endpoint
  - job_name: 'n8n'
    static_configs:
      - targets: ['nexus-n8n:5678']
    metrics_path: '/metrics'

  # Pushgateway for batch / one-shot job metrics (e.g., Trivy scans)
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['nexus-pushgateway:9091']

  # WireGuard interface and peer metrics
  - job_name: 'wireguard'
    static_configs:
      - targets: ['nexus-wireguard-exporter:9586']

  # HTTP health checks for services without native Prometheus metrics
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://nexus-portainer:9000/api/status
          - http://nexus-vaultwarden:80/alive
          - http://nexus-app:3030
          - http://nexus-nginx-pm:81
          - http://nexus-uptime-kuma:3001
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: nexus-blackbox-exporter:9115

