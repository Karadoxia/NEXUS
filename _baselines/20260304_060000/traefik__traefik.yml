global:
  checkNewVersion: true
  sendAnonymousUsage: false
entryPoints:
  websecure:
    address: ":443"
providers:
  docker: {}
  file:
    directory: /dynamic.yml
    watch: true
certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@yourdomain.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
