################################################################################
# redis-cache-config.conf - NEXUS-V2 Redis Optimization Configuration
#
# Purpose: 
#   Production-grade Redis settings for session caching, query result caching,
#   and distributed locking throughout NEXUS-V2
#
# Memory Management:
#   - Max memory: 512MB (set in docker-compose.yml)
#   - Eviction policy: allkeys-lru (remove any key using LRU when full)
#   - Fragmentation ratio max: 1.5x
#
# Performance:
#   - TCP backlog: 511 connections (for high concurrency)
#   - Timeout: 0 (never close idle connections)
#   - Database (keyspace): 0 (only one - simplifies management)
#
################################################################################

# Accept connections only on Docker internal networks
bind 0.0.0.0
protected-mode yes
port 6379

# Concurrency tuning
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Replication (standalone, no replication)
repl-diskless-sync no
repl-diskless-sync-delay 5

# SNAPSHOT (RDB) - Disabled in favor of AOF
# save ""  # Uncomment to disable RDB saving entirely
# save 900 1    # Save if 1 key changed in 900 seconds
# save 300 10   # Save if 10 keys changed in 300 seconds
# save 60 10000 # Save if 10000 keys changed in 60 seconds

# RDB compression
rdbcompression yes
rdbchecksum yes

# AOF (Append-Only File) - Better durability for caching
appendonly no  # Set to 'yes' if you need durability
# appendfilename "appendonly.aof"
# appendfsync always     # Safest but slowest
# appendfsync everysec   # Recommended (once per second)
# appendfsync no         # Fastest but least safe

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru  # Remove least recently used keys when full

# LRU sample size (higher = more accurate but slower)
maxmemory-samples 5

# LAZY FREEING - Prevent blocking on large key deletion
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Clustering (disabled - standalone node)
cluster-enabled no

# Databases
databases 1  # Only use db 0

# Logging
loglevel notice
logfile ""  # Log to stdout (captured by Docker logs)

# Slowlog
slowlog-log-slower-than 10000  # Log queries >10ms
slowlog-max-len 128

# Key expiration
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ACTIVE REHASHING
activerehashing yes

# CLIENT HANDLING
maxclients 10000  # Max concurrent clients
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ===== PERFORMANCE FEATURES =====

# Disable SAVE during low-memory situations
stop-writes-on-bgsave-error yes

# Enable active defragmentation to reduce memory fragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10    # Start defrag when fragmentation > 10%
active-defrag-threshold-upper 100   # Stop defrag when fragmentation < 100%

# JEMALLOC settings (handled by Redis)
# These settings help with memory efficiency

# ===== CACHE INVALIDATION POLICIES =====
# Define TTLs for different cache types in your application:
#
# Session Cache (nexus-app):
#   - Key pattern: session:*
#   - TTL: 24 hours (86400s)
#   - Sync: Every request renewal
#
# Query Result Cache:
#   - Key pattern: query:*
#   - TTL: 5 minutes (300s)
#   - Invalidation: Manual on data change
#
# User Profile Cache:
#   - Key pattern: user:*
#   - TTL: 1 hour (3600s)
#   - Invalidation: Manual on profile update
#
# Rate Limiting:
#   - Key pattern: rate:*
#   - TTL: Per rule (1-3600s)
#   - Purpose: API rate limiting
#
# Distributed Locks:
#   - Key pattern: lock:*
#   - TTL: 30 seconds (30s)
#   - Purpose: Mutual exclusion for critical sections
#
# Cache Warming:
#   - Key pattern: warm:*
#   - TTL: 1 day (86400s)
#   - Purpose: Preloaded commonly-used data

# ===== MONITORING COMMANDS =====
# Connect: redis-cli -h localhost -p 6379
#
# Check memory usage: INFO memory
# Check hit ratio: INFO stats | grep keyspace_hits/misses
# Check slow log: SLOWLOG GET 10
# Check connected clients: CLIENT LIST
# Monitor in real-time: MONITOR
# Check all keys: KEYS * (⚠️ Avoid in production, use SCAN instead)
# Flush database: FLUSHDB (⚠️ Dangers operation!)
# Rewrite AOF: BGREWRITEAOF
#
# Performance testing:
#   redis-benchmark -h localhost -p 6379 -t set,get -n 100000 -q

################################################################################
